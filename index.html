<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シンプルスケジュールアプリ</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google API -->
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

    <!-- ウェルカム画面 -->
    <div id="welcome-container" class="container">
        <h1>ようこそ！</h1>
        <div class="welcome-buttons">
            <button id="show-login-btn">ログイン</button>
            <button id="show-register-btn">新規登録</button>
        </div>
    </div>

    <!-- 新規登録画面 -->
    <div id="register-container" class="container hidden">
        <h1>👤 新規登録</h1>
        <form id="register-form">
            <input type="text" id="register-username" placeholder="ユーザー名" required>
            <input type="password" id="register-password" placeholder="パスワード" required>
            <button type="submit">登録して開始</button>
            <button type="button" class="back-btn">戻る</button>
        </form>
    </div>

    <!-- ログイン画面 -->
    <div id="login-container" class="container hidden">
        <h1>🔑 ログイン</h1>
        <form id="login-form">
            <input type="text" id="login-username" placeholder="ユーザー名" required>
            <input type="password" id="login-password" placeholder="パスワード" required>
            <button type="submit">ログイン</button>
            <button type="button" class="back-btn">戻る</button>
        </form>
    </div>

    <!-- スケジュール管理画面 -->
    <div id="schedule-container" class="container hidden">
        <div class="schedule-header">
             <h1>🗓️ スケジュール管理</h1>
             <button id="google-sync-btn" class="google-btn">Googleカレンダーと同期</button>
             <button id="logout-btn">ログアウト</button>
        </div>
        <p><strong id="current-user"></strong>さんの予定</p>

        <button id="openModalBtn">勉強内容の追加</button>

    <div id="modal" class="modal-overlay hidden">
        <div class="modal-content">
            <span id="closeModalBtn" class="close-button">&times;</span>
            <h2>勉強内容を登録</h2>

            <form id="studyForm" class="study-form">
                <label for="studyContent">勉強内容</label>
                <input type="text" id="studyContent" required>

                <label for="subject">科目</label>
                <input type="text" id="subject" required>

                <label for="studyTime">勉強時間（分）</label>
                <input type="number" id="studyTime" min="1" required>

                <button type="submit">登録</button>
            </form>
        </div>
    </div>

        <div id="calendar-container">
            <div class="calendar-controls">
                <div class="calendar-nav">
                    <button id="prev-btn" title="前へ">&lt;</button>
                    <button id="today-btn">今日</button>
                    <button id="next-btn" title="次へ">&gt;</button>
                </div>
                <h2 id="calendar-title"></h2>
                <div class="view-switcher">
                    <button id="day-view-btn">日</button>
                    <button id="week-view-btn" class="active">週</button>
                    <button id="month-view-btn">月</button>
                </div>
            </div>
            <div id="calendar-view"></div>
        </div>

        <form id="schedule-form" class="schedule-form">
            <input type="date" id="schedule-date" required>
            <input type="time" id="schedule-time" required>
            <input type="text" id="schedule-text" placeholder="予定を入力..." required>
            <button type="submit">追加</button>
        </form>

        <h2>📝 予定リスト（全件）</h2>
        <ul id="schedule-list"></ul>
    </div>

    <script src="script.js"></script>

    <style>
        /* 蓝色 Google 按钮样式 */
        .google-btn {
            background-color: #4285F4;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }
        .google-btn:hover {
            background-color: #357ae8;
        }
        .google-btn:active {
            transform: scale(0.97);
        }

        /* 全局按钮点击手势 */
        button {
            cursor: pointer;
        }
    </style>
</body>
</html>
